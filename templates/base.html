<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MindPulse{% endblock %} — iTaqiZ | SDG 3</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a href="/" class="logo-group">
          <div class="tz-monogram">TZ</div>
          <div class="logo-text">
            <span class="logo-name">MindPulse</span>
            <span class="logo-sub">iTaqiZ · SDG 3</span>
          </div>
        </a>
        <nav>
          <a href="/">Check In</a>
          <a href="/history">History</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-left">
          <span class="footer-brand">iTaqiZ | Pakistan</span>
          <span class="footer-sdg">UN SDG 3 — Good Health &amp; Well-being</span>
        </div>
        <div class="footer-tz">TZ</div>
      </div>
    </div>
  </footer>

</body>
</html>
